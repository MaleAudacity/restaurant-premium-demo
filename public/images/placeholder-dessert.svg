<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#111f15"/>
  <rect x="20" y="20" width="360" height="260" rx="16" fill="#162a1a" stroke="#e8a020" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Dessert glass / kulfi shape -->
  <path d="M185 90 L175 170 Q175 178 200 178 Q225 178 225 170 L215 90 Z" fill="none" stroke="#e8a020" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Rim of glass -->
  <ellipse cx="200" cy="90" rx="17" ry="5" fill="none" stroke="#e8a020" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Garnish on top -->
  <path d="M195 85 Q200 78 205 85" fill="none" stroke="#e8a020" stroke-width="1.2" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Rose petals hint -->
  <circle cx="200" cy="82" r="3" fill="none" stroke="#e8a020" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Cream layer -->
  <path d="M180 115 Q200 110 220 115" fill="none" stroke="#c8b89a" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round"/>
  <!-- Pistachio dots -->
  <circle cx="193" cy="140" r="2" fill="#c8b89a" opacity="0.35"/>
  <circle cx="207" cy="145" r="2" fill="#c8b89a" opacity="0.35"/>
  <circle cx="199" cy="155" r="2" fill="#c8b89a" opacity="0.3"/>
  <!-- Saucer -->
  <ellipse cx="200" cy="178" rx="28" ry="6" fill="none" stroke="#c8b89a" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#e8a020" opacity="0.7">Desserts &amp; Pour</text>
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c8b89a" opacity="0.5">Image coming soon</text>
</svg>