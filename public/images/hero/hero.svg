<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a1a08"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <radialGradient id="plate1" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#2a1a0a"/><stop offset="100%" stop-color="#141008"/></radialGradient>
    <radialGradient id="plate2" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#2a1810"/><stop offset="100%" stop-color="#120c08"/></radialGradient>
    <radialGradient id="curry" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#e87020"/><stop offset="50%" stop-color="#c84808"/><stop offset="100%" stop-color="#8a2800"/></radialGradient>
    <radialGradient id="rice" cx="40%" cy="25%" r="70%"><stop offset="0%" stop-color="#f8e898"/><stop offset="50%" stop-color="#e8c858"/><stop offset="100%" stop-color="#c09820"/></radialGradient>
    <radialGradient id="prawn" cx="30%" cy="25%" r="65%"><stop offset="0%" stop-color="#ff9050"/><stop offset="55%" stop-color="#e05520"/><stop offset="100%" stop-color="#982808"/></radialGradient>
    <radialGradient id="paneer" cx="30%" cy="25%" r="65%"><stop offset="0%" stop-color="#ffe0a0"/><stop offset="50%" stop-color="#f0c060"/><stop offset="100%" stop-color="#c88020"/></radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e8a020" stop-opacity="0.2"/><stop offset="100%" stop-color="#e8a020" stop-opacity="0"/></radialGradient>
    <filter id="softshadow"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.6)"/></filter>
  </defs>
  <rect width="600" height="500" fill="url(#bg)"/>

  <!-- Ambient golden glow -->
  <ellipse cx="300" cy="260" rx="220" ry="180" fill="url(#glow)"/>

  <!-- BACK PLATE: Biryani Handi (top center) -->
