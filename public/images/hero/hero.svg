  <path d="M228 128 Q222 98 226 78 Q230 62 300 60 Q370 62 374 78 Q378 98 372 128Z" fill="#1a1208"/>
  <path d="M232 126 Q226 98 230 80 Q234 65 300 63 Q366 65 370 80 Q374 98 368 126Z" fill="#221808"/>
  <ellipse cx="300" cy="70" rx="62" ry="10" fill="#2a2010" stroke="#6a4818" stroke-width="1.5"/>
  <ellipse cx="300" cy="68" rx="59" ry="8" fill="url(#rice)"/>
  <!-- Rice texture -->
  <line x1="268" y1="66" x2="272" y2="70" stroke="#d8b840" stroke-width="1" opacity="0.5"/>
  <line x1="283" y1="64" x2="287" y2="68" stroke="#d8b840" stroke-width="1" opacity="0.5"/>
  <line x1="298" y1="63" x2="302" y2="67" stroke="#d8b840" stroke-width="1" opacity="0.5"/>
  <line x1="313" y1="64" x2="317" y2="68" stroke="#d8b840" stroke-width="1" opacity="0.5"/>
  <line x1="328" y1="66" x2="332" y2="70" stroke="#d8b840" stroke-width="1" opacity="0.5"/>
  <!-- Saffron tint -->
  <ellipse cx="290" cy="66" rx="18" ry="4" fill="#e89820" opacity="0.5"/>
  <!-- Fried onion on rice -->
  <path d="M278 60 Q286 54 294 58" fill="none" stroke="#c07818" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M308 58 Q316 52 323 56" fill="none" stroke="#b06810" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <!-- Mint leaves -->
  <path d="M258 63 Q264 55 268 60 Q264 67 258 63Z" fill="#3a8820"/>
  <!-- Saffron strand -->
  <path d="M288 55 Q294 49 300 55" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Handi handles -->
  <path d="M222 90 Q210 83 210 100 Q210 112 222 108" fill="none" stroke="#3a2010" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M378 90 Q390 83 390 100 Q390 112 378 108" fill="none" stroke="#3a2010" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- LEFT PLATE: Butter Chicken bowl -->
  <ellipse cx="155" cy="290" rx="108" ry="38" fill="url(#plate1)" filter="url(#softshadow)"/>
  <ellipse cx="155" cy="286" rx="104" ry="36" fill="#1e1208"/>
  <ellipse cx="155" cy="262" rx="104" ry="16" fill="#2a1810" stroke="#4a2810" stroke-width="1"/>
  <ellipse cx="155" cy="260" rx="100" ry="14" fill="#221408"/>
  <ellipse cx="155" cy="261" rx="104" ry="16" fill="none" stroke="#9a6228" stroke-width="1" opacity="0.5"/>
  <ellipse cx="155" cy="262" rx="96" ry="13" fill="url(#curry)"/>
  <ellipse cx="155" cy="260" rx="92" ry="11" fill="#d06020"/>
  <ellipse cx="140" cy="254" rx="18" ry="7" fill="#e87828" opacity="0.4"/>
  <!-- Chicken pieces -->
  <ellipse cx="128" cy="262" rx="18" ry="11" fill="#d08840"/>
  <ellipse cx="182" cy="264" rx="16" ry="10" fill="#c07830" opacity="0.85"/>
  <!-- Cream swirl -->
  <path d="M136 252 Q155 243 174 252" fill="none" stroke="#fffaf0" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Butter pat -->
  <ellipse cx="140" cy="251" rx="9" ry="4" fill="#f8e040" opacity="0.7"/>
  <!-- Kasuri methi -->
  <circle cx="165" cy="248" r="1.5" fill="#3a6a10" opacity="0.8"/>
  <circle cx="172" cy="250" r="1.2" fill="#4a7a18" opacity="0.7"/>
  <!-- Naan hint -->
  <path d="M52 280 Q75 265 82 278 Q76 292 58 293 Q50 290 52 280Z" fill="#e8c870" opacity="0.7"/>

  <!-- RIGHT PLATE: Prawns on cast iron -->
  <ellipse cx="445" cy="285" rx="108" ry="36" fill="url(#plate2)" filter="url(#softshadow)"/>
  <ellipse cx="445" cy="281" rx="104" ry="34" fill="#181410"/>
  <ellipse cx="445" cy="258" rx="104" ry="16" fill="#201810" stroke="#2a1e10" stroke-width="1"/>
  <ellipse cx="445" cy="256" rx="100" ry="14" fill="#181410"/>
  <!-- Prawn 1 -->
  <path d="M400 278 Q380 255 390 235 Q404 217 422 226 Q436 235 429 251 Q422 263 411 270Z" fill="url(#prawn)"/>
  <path d="M420 228 L428 218 M420 228 L426 215" stroke="#ff6020" stroke-width="2" stroke-linecap="round" fill="none"/>
  <ellipse cx="413" cy="271" rx="8" ry="5" fill="#a02808" transform="rotate(-30 413 271)"/>
  <!-- Prawn 2 -->
  <path d="M445 272 Q426 248 436 228 Q450 210 468 220 Q482 230 473 248 Q466 260 454 267Z" fill="url(#prawn)"/>
  <path d="M466 222 L474 212 M466 222 L472 209" stroke="#ff5820" stroke-width="2" stroke-linecap="round" fill="none"/>
  <ellipse cx="456" cy="269" rx="7" ry="4" fill="#a02808" transform="rotate(-25 456 269)"/>
  <!-- Butter baste -->
  <path d="M398 262 Q422 255 448 258 Q468 253 480 260" fill="none" stroke="#f8d860" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>
  <!-- Curry leaf -->
  <path d="M384 252 Q392 242 396 248 Q392 256 384 252Z" fill="#3a8820"/>
  <path d="M390 244 Q398 234 402 240 Q398 248 390 244Z" fill="#4a9828"/>
  <!-- Lime -->
  <path d="M468 264 Q480 253 488 260 Q484 274 474 276Z" fill="#7ab828" opacity="0.8"/>

  <!-- CENTER FRONT: Paneer tikka skewers -->
  <rect x="180" y="378" width="240" height="5" rx="2.5" fill="#a08060" transform="rotate(-3 300 380)"/>
  <rect x="196" y="362" width="60" height="26" rx="13" fill="url(#paneer)" transform="rotate(-3 226 375)"/>
  <circle cx="218" cy="373" r="7" fill="#1a0800" opacity="0.35" transform="rotate(-3 218 373)"/>
  <rect x="264" y="360" width="60" height="26" rx="13" fill="url(#paneer)" transform="rotate(-3 294 373)"/>
  <circle cx="285" cy="371" r="7" fill="#1a0800" opacity="0.3" transform="rotate(-3 285 371)"/>
  <!-- Bell pepper between paneer -->
  <rect x="232" y="362" width="22" height="24" rx="4" fill="#cc3010" transform="rotate(-3 243 374)"/>

  <rect x="182" y="400" width="236" height="5" rx="2.5" fill="#a08060" transform="rotate(2 300 402)"/>
  <rect x="192" y="386" width="60" height="26" rx="13" fill="#e8c070" transform="rotate(2 222 399)"/>
  <circle cx="210" cy="397" r="6" fill="#1a0800" opacity="0.32" transform="rotate(2 210 397)"/>
  <rect x="260" y="383" width="60" height="26" rx="13" fill="url(#paneer)" transform="rotate(2 290 396)"/>
  <rect x="228" y="384" width="22" height="24" rx="4" fill="#2a8818" transform="rotate(2 239 396)"/>

  <!-- Saffron strands scattered -->
  <path d="M270 356 Q276 349 282 354" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M295 352 Q301 345 307 350" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M318 356 Q324 349 330 354" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Chutney bowl -->
  <circle cx="480" cy="390" r="28" fill="#1a5010" opacity="0.85"/>
  <circle cx="480" cy="390" r="23" fill="#2a6a18"/>
  <path d="M470 387 Q478 380 486 387 Q482 394 478 392 Q474 394 470 387Z" fill="#3a8a28" opacity="0.85"/>

  <!-- Gold accent dots scattered -->
  <circle cx="220" cy="345" r="2" fill="#d4a820" opacity="0.7"/>
  <circle cx="380" cy="342" r="2" fill="#d4a820" opacity="0.65"/>
  <circle cx="300" cy="335" r="2.5" fill="#d4a820" opacity="0.75"/>

  <!-- LABEL at bottom -->
  <text x="300" y="465" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#e8a020" opacity="0.95" letter-spacing="1">Mirch Masala</text>
  <text x="300" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c8b89a" opacity="0.6" letter-spacing="3">PREMIUM INDIAN DINING</text>
</svg>
