<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0e04"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <radialGradient id="plate" cx="50%" cy="35%" r="60%"><stop offset="0%" stop-color="#2a1a08"/><stop offset="100%" stop-color="#140c04"/></radialGradient>
    <radialGradient id="rice" cx="40%" cy="25%" r="70%"><stop offset="0%" stop-color="#f5e088"/><stop offset="50%" stop-color="#e0c058"/><stop offset="100%" stop-color="#b89018"/></radialGradient>
    <radialGradient id="meat" cx="30%" cy="25%" r="65%"><stop offset="0%" stop-color="#c07030"/><stop offset="60%" stop-color="#8a4010"/><stop offset="100%" stop-color="#582008"/></radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Plate -->
  <ellipse cx="200" cy="192" rx="120" ry="26" fill="#050200" opacity="0.6"/>
  <ellipse cx="200" cy="184" rx="122" ry="30" fill="url(#plate)"/>
  <ellipse cx="200" cy="180" rx="114" ry="27" fill="#1e1208"/>
  <!-- Decorative plate rim -->
  <ellipse cx="200" cy="175" rx="108" ry="23" fill="none" stroke="#7a5018" stroke-width="1.2" opacity="0.4"/>

  <!-- Mounded rice base -->
  <ellipse cx="200" cy="168" rx="96" ry="30" fill="#c8980e"/>
  <ellipse cx="200" cy="160" rx="88" ry="28" fill="url(#rice)"/>
  <ellipse cx="200" cy="152" rx="72" ry="22" fill="#f0d870"/>
  <ellipse cx="200" cy="146" rx="52" ry="16" fill="#f5e080"/>
  <ellipse cx="200" cy="142" rx="35" ry="11" fill="#fae888"/>

  <!-- Rice grain details -->
  <line x1="162" y1="155" x2="166" y2="160" stroke="#d8b840" stroke-width="1" opacity="0.5"/>
  <line x1="175" y1="150" x2="179" y2="155" stroke="#d8b840" stroke-width="1" opacity="0.5"/>
  <line x1="188" y1="147" x2="192" y2="152" stroke="#d8b840" stroke-width="1" opacity="0.5"/>
  <line x1="202" y1="147" x2="206" y2="152" stroke="#d8b840" stroke-width="1" opacity="0.5"/>
  <line x1="216" y1="149" x2="220" y2="154" stroke="#d8b840" stroke-width="1" opacity="0.5"/>
  <line x1="228" y1="153" x2="232" y2="158" stroke="#d8b840" stroke-width="1" opacity="0.5"/>

  <!-- Gosht (lamb) pieces on rice mound -->
  <ellipse cx="178" cy="150" rx="18" ry="12" fill="url(#meat)"/>
  <ellipse cx="178" cy="148" rx="15" ry="10" fill="#a05018"/>
  <ellipse cx="222" cy="152" rx="16" ry="11" fill="url(#meat)" opacity="0.9"/>
  <ellipse cx="222" cy="150" rx="13" ry="9" fill="#9a4a15"/>
  <ellipse cx="200" cy="143" rx="14" ry="9" fill="#b05820" opacity="0.85"/>

  <!-- Saffron streaks on rice -->
  <path d="M160 155 Q185 148 210 152" fill="none" stroke="#e89820" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <path d="M170 162 Q200 156 230 160" fill="none" stroke="#d88010" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>

  <!-- Fried onions (golden brown) -->
  <path d="M155 162 Q162 157 170 161" fill="none" stroke="#c07818" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M230 160 Q238 155 245 159" fill="none" stroke="#b06810" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M180 168 Q188 163 196 167" fill="none" stroke="#c07818" stroke-width="2" stroke-linecap="round" opacity="0.65"/>

  <!-- Mint leaves -->
  <path d="M145 155 Q151 147 155 152 Q151 159 145 155Z" fill="#3a8820"/>
  <path d="M151 148 Q157 140 161 145 Q157 152 151 148Z" fill="#4a9828"/>
  <!-- Mint vein -->
  <path d="M146 155 Q151 148 154 152" fill="none" stroke="#2a6a18" stroke-width="0.6"/>

  <!-- Rose water garnish drops -->
  <circle cx="254" cy="153" r="2.5" fill="#e87080" opacity="0.6"/>
  <circle cx="260" cy="158" r="2" fill="#e87080" opacity="0.5"/>

  <!-- Boiled egg slice peeking -->
  <ellipse cx="268" cy="162" rx="12" ry="9" fill="#f0e8c0"/>
  <ellipse cx="268" cy="162" rx="7" ry="5" fill="#f0a820"/>
  <ellipse cx="268" cy="162" rx="3" ry="2.5" fill="#e08010"/>

  <!-- Label -->
  <text x="200" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#e8a020" opacity="0.9" letter-spacing="0.3">Lucknowi Gosht Biryani</text>
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">BIRYANI ATELIER</text>
</svg>
