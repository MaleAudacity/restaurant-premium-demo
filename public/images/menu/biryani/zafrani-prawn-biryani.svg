  <path d="M168 163 Q198 157 228 162" fill="none" stroke="#d88010" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Prawns on top of rice -->
  <!-- Prawn 1 -->
  <path d="M155 162 Q138 145 146 130 Q158 116 172 124 Q182 132 176 146 Q170 156 160 160Z" fill="url(#prawn)"/>
  <path d="M170 126 L177 117 M170 126 L175 114" stroke="#ff6020" stroke-width="2" stroke-linecap="round" fill="none"/>
  <ellipse cx="162" cy="162" rx="7" ry="4" fill="#a02808" transform="rotate(-30 162 162)"/>

  <!-- Prawn 2 (center, prominent) -->
  <path d="M195 155 Q176 134 185 115 Q200 98 216 108 Q229 118 221 136 Q215 148 204 154Z" fill="url(#prawn)"/>
  <path d="M214 110 L222 100 M214 110 L220 97 M214 110 L215 95" stroke="#ff5820" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <ellipse cx="206" cy="156" rx="7" ry="4" fill="#a02808" transform="rotate(-25 206 156)"/>

  <!-- Prawn 3 -->
  <path d="M235 158 Q218 140 226 124 Q240 108 255 117 Q267 127 259 142 Q253 153 243 158Z" fill="url(#prawn)" opacity="0.9"/>
  <path d="M253 118 L261 108 M253 118 L259 106" stroke="#ff5820" stroke-width="2" stroke-linecap="round" fill="none"/>
  <ellipse cx="245" cy="160" rx="7" ry="4" fill="#a02808" transform="rotate(-20 245 160)"/>

  <!-- Fried onions -->
  <path d="M148 167 Q155 162 162 166" fill="none" stroke="#c07818" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M238 165 Q245 160 252 164" fill="none" stroke="#b06810" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Mint leaves -->
  <path d="M143 155 Q149 147 153 152 Q149 159 143 155Z" fill="#3a8820"/>
  <path d="M149 148 Q155 140 159 145 Q155 152 149 148Z" fill="#4a9828"/>

  <!-- Saffron strands garnish -->
  <path d="M183 136 Q188 130 193 135" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M205 133 Q210 127 215 132" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Lime wedge -->
  <path d="M270 157 Q282 146 290 153 Q286 167 275 169Z" fill="#7ab828" opacity="0.8"/>
  <path d="M270 157 Q282 146 289 153" fill="none" stroke="#5a9818" stroke-width="0.8"/>

  <!-- Label -->
  <text x="200" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#e8a020" opacity="0.9" letter-spacing="0.3">Zafrani Prawn Biryani</text>
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">BIRYANI ATELIER</text>
</svg>
