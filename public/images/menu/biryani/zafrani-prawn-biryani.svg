<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0e06"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <radialGradient id="plate" cx="50%" cy="35%" r="60%"><stop offset="0%" stop-color="#2a1808"/><stop offset="100%" stop-color="#140c04"/></radialGradient>
    <radialGradient id="rice" cx="40%" cy="25%" r="70%"><stop offset="0%" stop-color="#f8e898"/><stop offset="50%" stop-color="#e8c858"/><stop offset="100%" stop-color="#b89018"/></radialGradient>
    <radialGradient id="prawn" cx="30%" cy="25%" r="65%"><stop offset="0%" stop-color="#ff9050"/><stop offset="55%" stop-color="#e05520"/><stop offset="100%" stop-color="#982808"/></radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="192" rx="118" ry="26" fill="#040200" opacity="0.65"/>
  <ellipse cx="200" cy="184" rx="120" ry="30" fill="url(#plate)"/>
  <ellipse cx="200" cy="180" rx="112" ry="27" fill="#1c1008"/>
  <ellipse cx="200" cy="175" rx="106" ry="23" fill="none" stroke="#7a4818" stroke-width="1" opacity="0.35"/>

  <!-- Rice mound -->
  <ellipse cx="200" cy="168" rx="94" ry="29" fill="#b08808"/>
  <ellipse cx="200" cy="160" rx="86" ry="27" fill="url(#rice)"/>
  <ellipse cx="200" cy="152" rx="70" ry="21" fill="#f0d870"/>
  <ellipse cx="200" cy="146" rx="50" ry="15" fill="#f5e080"/>
  <ellipse cx="200" cy="142" rx="32" ry="10" fill="#fae888"/>

