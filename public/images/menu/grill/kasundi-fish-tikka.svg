<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#0c1818"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <radialGradient id="fish" cx="30%" cy="25%" r="70%"><stop offset="0%" stop-color="#f0d090"/><stop offset="50%" stop-color="#d8a850"/><stop offset="100%" stop-color="#a87020"/></radialGradient>
    <radialGradient id="plate" cx="50%" cy="35%" r="60%"><stop offset="0%" stop-color="#1e1a10"/><stop offset="100%" stop-color="#100e08"/></radialGradient>
    <radialGradient id="char" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#1a0800" stop-opacity="0.9"/><stop offset="100%" stop-color="#1a0800" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Banana leaf plate liner -->
  <ellipse cx="200" cy="185" rx="118" ry="28" fill="#0a1806" opacity="0.7"/>
  <ellipse cx="200" cy="178" rx="122" ry="32" fill="#0f2208" opacity="0.6"/>
  <path d="M88 180 Q200 172 312 180" fill="none" stroke="#1a3a10" stroke-width="1" opacity="0.5"/>
  <path d="M85 186 Q200 178 315 186" fill="none" stroke="#142e0a" stroke-width="0.7" opacity="0.4"/>
  <!-- Plate -->
  <ellipse cx="200" cy="175" rx="108" ry="27" fill="url(#plate)"/>

  <!-- Fish fillet 1 (back) -->
  <path d="M140 162 Q160 148 185 152 Q198 155 192 165 Q178 172 155 170 Q138 168 140 162Z" fill="url(#fish)"/>
  <path d="M145 158 Q165 150 183 154" fill="none" stroke="#f8dca0" stroke-width="1" opacity="0.4"/>
  <ellipse cx="165" cy="158" r="8" fill="url(#char)" rx="8" ry="5"/>
  <!-- Fish texture lines -->
  <path d="M150 162 Q162 156 175 160" fill="none" stroke="#b87830" stroke-width="0.8" opacity="0.4"/>
  <path d="M155 165 Q167 160 178 163" fill="none" stroke="#b87830" stroke-width="0.8" opacity="0.3"/>

  <!-- Fish fillet 2 (center, prominent) -->
  <path d="M160 148 Q185 132 215 138 Q232 143 225 155 Q208 165 178 162 Q158 158 160 148Z" fill="url(#fish)"/>
  <path d="M165 145 Q192 134 218 140" fill="none" stroke="#f8dca0" stroke-width="1.2" opacity="0.4"/>
  <ellipse cx="195" cy="147" rx="10" ry="6" fill="url(#char)"/>
  <ellipse cx="212" cy="150" rx="7" ry="4" fill="url(#char)"/>
  <path d="M170 150 Q190 143 212 147" fill="none" stroke="#b87830" stroke-width="0.8" opacity="0.4"/>
  <path d="M172 154 Q192 148 213 152" fill="none" stroke="#b87830" stroke-width="0.8" opacity="0.35"/>

  <!-- Fish fillet 3 (front right) -->
  <path d="M210 158 Q232 144 258 150 Q270 155 262 165 Q245 173 220 170 Q207 166 210 158Z" fill="#d8a040"/>
  <ellipse cx="240" cy="157" rx="9" ry="5" fill="url(#char)"/>
  <path d="M218 160 Q238 153 257 157" fill="none" stroke="#c89030" stroke-width="0.8" opacity="0.35"/>

  <!-- Kasundi mustard sauce smear -->
  <path d="M130 178 Q170 173 210 176 Q240 172 270 178" fill="none" stroke="#d4c010" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M132 180 Q172 175 212 178 Q242 174 272 180" fill="none" stroke="#e8d820" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Curry leaf garnish -->
  <path d="M108 162 Q116 152 120 158 Q116 166 108 162Z" fill="#3a8820"/>
  <path d="M112 154 Q120 144 124 150 Q120 158 112 154Z" fill="#4a9828"/>
  <path d="M116 162 Q124 152 128 158 Q124 166 116 162Z" fill="#3a8820"/>
  <path d="M113 154 Q119 146 122 150" fill="none" stroke="#2a6a18" stroke-width="0.6"/>

  <!-- Lime wedge -->
  <path d="M295 155 Q306 145 314 152 Q310 166 300 168 Z" fill="#6aaa28"/>
  <path d="M295 155 Q305 145 313 151" fill="none" stroke="#8ac840" stroke-width="0.8"/>

  <!-- Chilli flakes -->
  <path d="M185 170 L188 167 L189 170Z" fill="#cc2010" opacity="0.7"/>
  <path d="M220 168 L223 165 L224 168Z" fill="#cc2010" opacity="0.6"/>

  <!-- Label -->
  <text x="200" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#e8a020" opacity="0.9" letter-spacing="0.3">Kasundi Fish Tikka</text>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">TANDOOR &amp; GRILL</text>
</svg>
