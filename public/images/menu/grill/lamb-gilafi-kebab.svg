<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0e06"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <linearGradient id="lamb1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#c87840"/><stop offset="35%" stop-color="#a85820"/><stop offset="70%" stop-color="#8a3e10"/><stop offset="100%" stop-color="#702a08"/></linearGradient>
    <linearGradient id="lamb2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#d08848"/><stop offset="40%" stop-color="#b06028"/><stop offset="100%" stop-color="#783010"/></linearGradient>
    <linearGradient id="skewer" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7a6040"/><stop offset="50%" stop-color="#a88050"/><stop offset="100%" stop-color="#7a6040"/></linearGradient>
    <radialGradient id="char" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#0a0400" stop-opacity="0.9"/><stop offset="100%" stop-color="#0a0400" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Serving plate -->
  <ellipse cx="200" cy="186" rx="115" ry="27" fill="#080400" opacity="0.6"/>
  <ellipse cx="200" cy="179" rx="118" ry="29" fill="#150a04"/>
  <ellipse cx="200" cy="175" rx="110" ry="25" fill="#1c1008"/>
  <ellipse cx="200" cy="172" rx="104" ry="21" fill="#1a0e06"/>

  <!-- Skewer 1 -->
  <rect x="90" y="130" width="220" height="4.5" rx="2.2" fill="url(#skewer)" transform="rotate(-4 200 132)"/>
  <!-- Gilafi coating: capsicum/pepper pieces around the lamb -->
  <rect x="115" y="116" width="75" height="26" rx="13" fill="url(#lamb1)" transform="rotate(-4 152 129)"/>
  <!-- Gilafi (stuffed pepper pieces on surface) -->
  <rect x="118" y="112" width="10" height="8" rx="2" fill="#cc3010" opacity="0.8" transform="rotate(-4 123 116)"/>
  <rect x="133" y="112" width="10" height="8" rx="2" fill="#2a8810" opacity="0.8" transform="rotate(-4 138 116)"/>
  <rect x="148" y="113" width="10" height="8" rx="2" fill="#cc3010" opacity="0.8" transform="rotate(-4 153 117)"/>
  <rect x="163" y="113" width="10" height="8" rx="2" fill="#2a8810" opacity="0.8" transform="rotate(-4 168 117)"/>
  <!-- Char marks -->
  <ellipse cx="130" cy="128" rx="7" ry="5" fill="url(#char)" transform="rotate(-4 130 128)"/>
  <ellipse cx="155" cy="126" rx="6" ry="4" fill="url(#char)" transform="rotate(-4 155 126)"/>
  <path d="M116 120 Q153 113 190 118" fill="none" stroke="#ffeeda" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>

  <!-- Skewer 2 -->
  <rect x="90" y="154" width="220" height="4.5" rx="2.2" fill="url(#skewer)" transform="rotate(2 200 156)"/>
  <rect x="120" y="140" width="78" height="26" rx="13" fill="url(#lamb2)" transform="rotate(2 159 153)"/>
  <rect x="122" y="136" width="10" height="8" rx="2" fill="#cc3010" opacity="0.8" transform="rotate(2 127 140)"/>
  <rect x="137" y="135" width="10" height="8" rx="2" fill="#e8b020" opacity="0.8" transform="rotate(2 142 139)"/>
  <rect x="152" y="135" width="10" height="8" rx="2" fill="#cc3010" opacity="0.8" transform="rotate(2 157 139)"/>
  <rect x="167" y="136" width="10" height="8" rx="2" fill="#2a8810" opacity="0.8" transform="rotate(2 172 140)"/>
  <ellipse cx="135" cy="152" rx="6" ry="4" fill="url(#char)" transform="rotate(2 135 152)"/>
  <ellipse cx="160" cy="150" rx="6" ry="4" fill="url(#char)" transform="rotate(2 160 150)"/>

  <!-- Skewer 3 -->
  <rect x="90" y="175" width="220" height="4.5" rx="2.2" fill="url(#skewer)" transform="rotate(-2 200 177)"/>
  <rect x="130" y="161" width="75" height="26" rx="13" fill="url(#lamb1)" transform="rotate(-2 167 174)"/>
  <rect x="133" y="157" width="10" height="8" rx="2" fill="#2a8810" opacity="0.8" transform="rotate(-2 138 161)"/>
  <rect x="148" y="157" width="10" height="8" rx="2" fill="#cc3010" opacity="0.8" transform="rotate(-2 153 161)"/>
  <rect x="163" y="157" width="10" height="8" rx="2" fill="#e8b020" opacity="0.8" transform="rotate(-2 168 161)"/>
  <ellipse cx="148" cy="172" rx="6" ry="4" fill="url(#char)"/>
  <ellipse cx="170" cy="171" rx="5" ry="4" fill="url(#char)"/>

  <!-- Green chutney cup -->
  <circle cx="310" cy="157" r="20" fill="#1a4810" opacity="0.85"/>
  <circle cx="310" cy="157" r="16" fill="#2a6a18"/>
  <path d="M303 155 Q308 150 314 155 Q311 160 308 159 Q305 160 303 155Z" fill="#3a8a28" opacity="0.9"/>

  <!-- Sliced onion -->
  <ellipse cx="105" cy="167" rx="16" ry="7" fill="none" stroke="#e8c0a0" stroke-width="1.5" opacity="0.65"/>
  <ellipse cx="105" cy="167" rx="10" ry="4" fill="none" stroke="#d8a890" stroke-width="1" opacity="0.45"/>

  <!-- Lemon slice -->
  <circle cx="95" cy="148" r="13" fill="#d8d020" opacity="0.7"/>
  <circle cx="95" cy="148" r="10" fill="#e8e030" opacity="0.8"/>
  <line x1="95" y1="138" x2="95" y2="158" stroke="#b0b010" stroke-width="0.8" opacity="0.7"/>
  <line x1="85" y1="148" x2="105" y2="148" stroke="#b0b010" stroke-width="0.8" opacity="0.7"/>
  <line x1="88" y1="141" x2="102" y2="155" stroke="#b0b010" stroke-width="0.5" opacity="0.5"/>
  <line x1="88" y1="155" x2="102" y2="141" stroke="#b0b010" stroke-width="0.5" opacity="0.5"/>

  <!-- Label -->
  <text x="200" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#e8a020" opacity="0.9" letter-spacing="0.3">Lamb Gilafi Kebab</text>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">TANDOOR &amp; GRILL</text>
</svg>
