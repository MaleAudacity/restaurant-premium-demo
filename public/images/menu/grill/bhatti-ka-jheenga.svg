<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0c08"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <radialGradient id="prawn1" cx="25%" cy="25%" r="70%"><stop offset="0%" stop-color="#ff9a50"/><stop offset="55%" stop-color="#e85520"/><stop offset="100%" stop-color="#982808"/></radialGradient>
    <radialGradient id="prawn2" cx="25%" cy="25%" r="70%"><stop offset="0%" stop-color="#ffa060"/><stop offset="55%" stop-color="#f06030"/><stop offset="100%" stop-color="#a03018"/></radialGradient>
    <radialGradient id="plate" cx="50%" cy="35%" r="60%"><stop offset="0%" stop-color="#1e1a10"/><stop offset="100%" stop-color="#0e0c08"/></radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff4000" stop-opacity="0.25"/><stop offset="100%" stop-color="#ff4000" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Coal/charcoal glow hint -->
  <ellipse cx="200" cy="230" rx="100" ry="40" fill="url(#glow)"/>
  <!-- Dark cast iron tawa -->
  <ellipse cx="200" cy="185" rx="120" ry="30" fill="#080806" opacity="0.8"/>
  <ellipse cx="200" cy="178" rx="122" ry="32" fill="url(#plate)"/>
  <ellipse cx="200" cy="174" rx="114" ry="28" fill="#181410"/>
  <ellipse cx="200" cy="171" rx="108" ry="24" fill="#1a1510"/>

  <!-- Large prawn 1 (left, arched) -->
  <path d="M148 178 Q128 155 138 135 Q152 116 172 124 Q188 132 182 150 Q176 162 164 170Z" fill="url(#prawn1)"/>
  <!-- Body segments -->
  <path d="M153 168 Q142 150 148 138" fill="none" stroke="#c04010" stroke-width="1.2" opacity="0.5"/>
  <path d="M156 163 Q148 148 153 138" fill="none" stroke="#ff8040" stroke-width="0.8" opacity="0.35"/>
  <!-- Tail fan -->
  <path d="M174 126 L182 116 M174 126 L180 112 M174 126 L175 110" stroke="#ff7030" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Head -->
  <ellipse cx="166" cy="172" rx="9" ry="6" fill="#aa2808" transform="rotate(-30 166 172)"/>
  <!-- Antennae -->
  <path d="M162 167 Q148 152 145 140" fill="none" stroke="#d86020" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M165 165 Q155 148 153 138" fill="none" stroke="#d86020" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Large prawn 2 (center, dominant) -->
  <path d="M195 172 Q173 145 184 122 Q200 102 220 112 Q238 122 228 145 Q220 158 207 165Z" fill="url(#prawn2)"/>
  <path d="M200 162 Q186 142 192 128" fill="none" stroke="#c04010" stroke-width="1.2" opacity="0.5"/>
  <path d="M220 114 L228 103 M220 114 L227 100 M220 114 L221 98" stroke="#ff6020" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <ellipse cx="210" cy="167" rx="8" ry="5" fill="#aa2808" transform="rotate(-25 210 167)"/>
  <path d="M206 162 Q190 145 188 132" fill="none" stroke="#d86020" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

  <!-- Large prawn 3 (right) -->
  <path d="M245 175 Q227 152 236 132 Q250 114 268 122 Q282 132 274 150 Q267 163 255 170Z" fill="url(#prawn1)" opacity="0.9"/>
  <path d="M265 124 L273 114 M265 124 L271 110" stroke="#ff7030" stroke-width="2" stroke-linecap="round" fill="none"/>
  <ellipse cx="257" cy="172" rx="8" ry="5" fill="#aa2808" transform="rotate(-20 257 172)"/>

  <!-- Bhatti spice rub (smoky dust) -->
  <circle cx="190" cy="165" r="1.8" fill="#2a1008" opacity="0.8"/>
  <circle cx="215" cy="158" r="1.5" fill="#3a1808" opacity="0.7"/>
  <circle cx="175" cy="170" r="1.2" fill="#2a1008" opacity="0.8"/>
  <circle cx="235" cy="162" r="1.5" fill="#2a1008" opacity="0.7"/>

  <!-- Butter baste drizzle -->
  <path d="M155 160 Q185 153 215 157 Q240 151 262 158" fill="none" stroke="#f8d860" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>

  <!-- Wedge of lemon -->
  <path d="M105 162 Q118 150 128 158 Q124 172 112 174Z" fill="#d8d820" opacity="0.8"/>
  <path d="M105 162 Q118 150 127 157" fill="none" stroke="#b0b010" stroke-width="0.8"/>
  <line x1="116" y1="150" x2="116" y2="173" stroke="#b0b010" stroke-width="0.6" opacity="0.6"/>

  <!-- Coriander garnish -->
  <path d="M302 148 Q310 138 314 144 Q310 152 302 148Z" fill="#3a8820"/>
  <path d="M308 140 Q316 130 320 136 Q316 144 308 140Z" fill="#4a9828"/>
  <path d="M314 146 Q322 136 326 142 Q322 150 314 146Z" fill="#3a8820"/>

  <!-- Label -->
  <text x="200" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#e8a020" opacity="0.9" letter-spacing="0.3">Bhatti Ka Jheenga</text>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">TANDOOR &amp; GRILL</text>
</svg>
