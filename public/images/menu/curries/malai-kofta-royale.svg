<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a1005"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <radialGradient id="gravy" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#f0a040"/><stop offset="50%" stop-color="#d07020"/><stop offset="100%" stop-color="#8a3808"/></radialGradient>
    <radialGradient id="bowl" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#2a1a0a"/><stop offset="100%" stop-color="#150c04"/></radialGradient>
    <radialGradient id="kofta" cx="30%" cy="25%" r="65%"><stop offset="0%" stop-color="#f8e8b0"/><stop offset="50%" stop-color="#e8c870"/><stop offset="100%" stop-color="#c89030"/></radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Bowl shadow -->
  <ellipse cx="200" cy="193" rx="106" ry="20" fill="#020100" opacity="0.65"/>
  <!-- Bowl - elegant white/cream with gold rim -->
  <ellipse cx="200" cy="184" rx="108" ry="38" fill="url(#bowl)"/>
  <ellipse cx="200" cy="180" rx="104" ry="36" fill="#1e1208"/>
  <!-- Rim -->
  <ellipse cx="200" cy="152" rx="104" ry="16" fill="#2a1a08" stroke="#5a3a10" stroke-width="1"/>
  <ellipse cx="200" cy="150" rx="100" ry="14" fill="#221408"/>
  <!-- Gold rim accent -->
  <ellipse cx="200" cy="151" rx="104" ry="16" fill="none" stroke="#d4a020" stroke-width="1.5" opacity="0.6"/>

  <!-- Makhani/malai gravy surface -->
  <ellipse cx="200" cy="152" rx="96" ry="14" fill="url(#gravy)"/>
  <ellipse cx="200" cy="150" rx="92" ry="12" fill="#e09030"/>
  <!-- Cream/malai layer on top -->
  <ellipse cx="200" cy="148" rx="88" ry="10" fill="#f0c060" opacity="0.4"/>

  <!-- 3 koftas (fried paneer/potato balls) -->
  <circle cx="162" cy="148" r="18" fill="url(#kofta)"/>
  <circle cx="162" cy="146" r="15" fill="#f0dca0"/>
  <!-- Fried surface texture -->
  <circle cx="155" cy="141" r="5" fill="#d4a840" opacity="0.6"/>
  <circle cx="168" cy="140" r="4" fill="#c89830" opacity="0.5"/>
  <!-- Stuffing hint -->
  <circle cx="162" cy="145" r="5" fill="#cc4818" opacity="0.4"/>

  <circle cx="200" cy="144" r="20" fill="url(#kofta)"/>
  <circle cx="200" cy="142" r="17" fill="#f5e4a8"/>
  <circle cx="192" cy="138" r="6" fill="#d4a840" opacity="0.55"/>
  <circle cx="206" cy="137" r="5" fill="#c89830" opacity="0.45"/>
  <circle cx="200" cy="141" r="6" fill="#cc4818" opacity="0.35"/>

  <circle cx="238" cy="148" r="18" fill="url(#kofta)" opacity="0.9"/>
  <circle cx="238" cy="146" r="15" fill="#f0dca0" opacity="0.9"/>
  <circle cx="232" cy="141" r="5" fill="#d4a840" opacity="0.55"/>
  <circle cx="244" cy="142" r="4" fill="#c89830" opacity="0.45"/>

  <!-- Cream drizzle over koftas -->
  <path d="M152 135 Q200 125 248 135" fill="none" stroke="#fffaf0" stroke-width="2" stroke-linecap="round" opacity="0.65"/>

  <!-- Saffron strands on gravy -->
  <path d="M175 148 Q178 143 182 148" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M215 146 Q218 141 222 146" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Pistachio slivers on koftas -->
  <ellipse cx="160" cy="145" rx="3" ry="1.5" fill="#3a7a18" transform="rotate(-30 160 145)" opacity="0.8"/>
  <ellipse cx="200" cy="141" rx="3" ry="1.5" fill="#3a7a18" transform="rotate(20 200 141)" opacity="0.8"/>
  <ellipse cx="238" cy="145" rx="3" ry="1.5" fill="#3a7a18" transform="rotate(-15 238 145)" opacity="0.8"/>

  <!-- Coriander -->
  <path d="M250 130 Q258 120 262 126 Q258 134 250 130Z" fill="#3a8820"/>
  <circle cx="262" cy="126" r="2" fill="#4a9828" opacity="0.7"/>

  <!-- Label -->
  <text x="200" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#e8a020" opacity="0.9" letter-spacing="0.3">Malai Kofta Royale</text>
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">ROYAL CURRIES</text>
</svg>
