<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0c06"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <radialGradient id="curry" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#e87020"/><stop offset="50%" stop-color="#c84808"/><stop offset="100%" stop-color="#8a2800"/></radialGradient>
    <radialGradient id="bowl" cx="50%" cy="35%" r="60%"><stop offset="0%" stop-color="#2a1a10"/><stop offset="100%" stop-color="#150c08"/></radialGradient>
    <radialGradient id="chicken" cx="30%" cy="25%" r="65%"><stop offset="0%" stop-color="#f0b878"/><stop offset="60%" stop-color="#d08840"/><stop offset="100%" stop-color="#a06020"/></radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Bowl shadow -->
  <ellipse cx="200" cy="195" rx="110" ry="22" fill="#050200" opacity="0.7"/>
  <!-- Bowl body -->
  <ellipse cx="200" cy="185" rx="112" ry="40" fill="url(#bowl)"/>
  <ellipse cx="200" cy="182" rx="108" ry="37" fill="#1e1008"/>
  <!-- Bowl rim -->
  <ellipse cx="200" cy="152" rx="108" ry="18" fill="#2a1810" stroke="#3a2010" stroke-width="0.8"/>
  <ellipse cx="200" cy="150" rx="104" ry="16" fill="#221408"/>
  <!-- Gold rim accent -->
  <ellipse cx="200" cy="151" rx="108" ry="18" fill="none" stroke="#8a6020" stroke-width="1.2" opacity="0.6"/>

  <!-- Butter chicken gravy surface -->
  <ellipse cx="200" cy="152" rx="100" ry="15" fill="url(#curry)"/>
  <ellipse cx="200" cy="150" rx="96" ry="13" fill="#d86020"/>
  <!-- Gravy surface texture (oil sheen) -->
  <ellipse cx="185" cy="146" rx="18" ry="8" fill="#e87828" opacity="0.5"/>
  <ellipse cx="218" cy="148" rx="14" ry="6" fill="#f08030" opacity="0.35"/>

  <!-- Chicken pieces submerged in gravy -->
  <ellipse cx="165" cy="153" rx="20" ry="12" fill="url(#chicken)"/>
  <ellipse cx="165" cy="150" rx="17" ry="10" fill="#d89850"/>
  <ellipse cx="230" cy="155" rx="18" ry="11" fill="url(#chicken)" opacity="0.9"/>
  <ellipse cx="200" cy="158" rx="16" ry="9" fill="#c88040" opacity="0.85"/>

  <!-- Cream swirl on top -->
  <path d="M182 143 Q200 135 218 143" fill="none" stroke="#fffaf0" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M190 140 Q200 133 210 140" fill="none" stroke="#fff8e8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Butter pat melting -->
  <ellipse cx="175" cy="141" rx="10" ry="5" fill="#f8e040" opacity="0.75"/>
  <ellipse cx="175" cy="140" rx="8" ry="3.5" fill="#ffe860" opacity="0.6"/>

  <!-- Fenugreek/kasuri methi garnish -->
  <circle cx="210" cy="138" r="2" fill="#3a6a10" opacity="0.8"/>
  <circle cx="218" cy="140" r="1.5" fill="#4a7a18" opacity="0.7"/>
  <circle cx="203" cy="136" r="1.5" fill="#3a6a10" opacity="0.8"/>

  <!-- Red chilli garnish -->
  <path d="M225 136 Q232 128 236 133 Q232 140 228 138 Q225 140 225 136Z" fill="#cc1808" opacity="0.8"/>

  <!-- Bowl decorative band -->
  <path d="M92 170 Q200 160 308 170" fill="none" stroke="#4a2a10" stroke-width="1.5" opacity="0.4"/>

  <!-- Naan bread peeking in corner -->
  <path d="M295 178 Q318 165 325 175 Q320 188 305 190 Q295 188 295 178Z" fill="#e8c870" opacity="0.75"/>
  <path d="M298 180 Q315 168 322 177" fill="none" stroke="#d0a840" stroke-width="0.8" opacity="0.5"/>

  <!-- Label -->
  <text x="200" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#e8a020" opacity="0.9">Butter Chicken</text>
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">ROYAL CURRIES</text>
</svg>
