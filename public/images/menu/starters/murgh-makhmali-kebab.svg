<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0c1a0f"/>
    </radialGradient>
    <linearGradient id="kebab1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e8c8"/>
      <stop offset="40%" stop-color="#e8c898"/>
      <stop offset="100%" stop-color="#c89850"/>
    </linearGradient>
    <linearGradient id="kebab2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0dfc0"/>
      <stop offset="40%" stop-color="#e0c080"/>
      <stop offset="100%" stop-color="#c09040"/>
    </linearGradient>
    <linearGradient id="skewer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a7a60"/>
      <stop offset="50%" stop-color="#c0a870"/>
      <stop offset="100%" stop-color="#8a7a60"/>
    </linearGradient>
    <radialGradient id="charmark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a2010" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3a2010" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Decorative leaf plate liner -->
  <ellipse cx="200" cy="185" rx="115" ry="25" fill="#0f1a08" opacity="0.5"/>
  <ellipse cx="200" cy="178" rx="120" ry="30" fill="#1a2810" opacity="0.6"/>
  <!-- Banana leaf texture lines -->
  <path d="M100 178 Q200 170 300 178" fill="none" stroke="#2a4018" stroke-width="0.8" opacity="0.5"/>
  <path d="M95 183 Q200 176 305 183" fill="none" stroke="#1a3010" stroke-width="0.6" opacity="0.4"/>

  <!-- Skewer 1 -->
  <rect x="100" y="128" width="200" height="5" rx="2.5" fill="url(#skewer)" transform="rotate(-5 200 130)"/>
  <!-- Kebab body 1 on skewer -->
  <rect x="130" y="114" width="60" height="28" rx="14" fill="url(#kebab1)" transform="rotate(-5 160 128)"/>
  <!-- Char marks -->
  <rect x="140" y="117" width="6" height="22" rx="3" fill="url(#charmark)" transform="rotate(-5 143 128)"/>
  <rect x="155" y="117" width="6" height="22" rx="3" fill="url(#charmark)" transform="rotate(-5 158 128)"/>
  <rect x="170" y="117" width="5" height="22" rx="3" fill="url(#charmark)" transform="rotate(-5 173 128)"/>
  <!-- Highlight -->
  <path d="M133 120 Q158 115 183 120" fill="none" stroke="#fff8e8" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Skewer 2 -->
  <rect x="100" y="152" width="200" height="5" rx="2.5" fill="url(#skewer)" transform="rotate(3 200 154)"/>
  <!-- Kebab body 2 -->
  <rect x="125" y="138" width="60" height="28" rx="14" fill="url(#kebab2)" transform="rotate(3 155 152)"/>
  <rect x="135" y="141" width="6" height="22" rx="3" fill="url(#charmark)" transform="rotate(3 138 152)"/>
  <rect x="150" y="141" width="6" height="22" rx="3" fill="url(#charmark)" transform="rotate(3 153 152)"/>
  <path d="M128 144 Q153 139 178 144" fill="none" stroke="#fff8e8" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Skewer 3 -->
  <rect x="100" y="173" width="200" height="5" rx="2.5" fill="url(#skewer)" transform="rotate(-2 200 175)"/>
  <!-- Kebab body 3 -->
  <rect x="135" y="160" width="60" height="28" rx="14" fill="url(#kebab1)" transform="rotate(-2 165 174)"/>
  <rect x="145" y="163" width="6" height="22" rx="3" fill="url(#charmark)" transform="rotate(-2 148 174)"/>
  <rect x="160" y="163" width="6" height="22" rx="3" fill="url(#charmark)" transform="rotate(-2 163 174)"/>
  <path d="M138 166 Q163 161 188 166" fill="none" stroke="#fff8e8" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Green chutney dot -->
  <circle cx="310" cy="160" r="22" fill="#1a5010" opacity="0.85"/>
  <circle cx="310" cy="160" r="18" fill="#2a6a18"/>
  <!-- Chutney swirl -->
  <path d="M303 158 Q308 153 314 158 Q318 163 313 166 Q308 168 304 165 Q301 162 303 158" fill="none" stroke="#4a8a30" stroke-width="1.2"/>

  <!-- Onion rings garnish -->
  <ellipse cx="110" cy="170" rx="18" ry="8" fill="none" stroke="#e8d0b0" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="110" cy="170" rx="12" ry="5" fill="none" stroke="#e8d0b0" stroke-width="1" opacity="0.5"/>

  <!-- Lemon slice -->
  <circle cx="95" cy="148" r="14" fill="#e8d820" opacity="0.7"/>
  <circle cx="95" cy="148" r="11" fill="#f0e840" opacity="0.8"/>
  <!-- Lemon segments -->
  <line x1="95" y1="137" x2="95" y2="159" stroke="#c8b810" stroke-width="0.8" opacity="0.7"/>
  <line x1="84" y1="148" x2="106" y2="148" stroke="#c8b810" stroke-width="0.8" opacity="0.7"/>
  <line x1="87" y1="140" x2="103" y2="156" stroke="#c8b810" stroke-width="0.5" opacity="0.5"/>
  <line x1="87" y1="156" x2="103" y2="140" stroke="#c8b810" stroke-width="0.5" opacity="0.5"/>

  <!-- Garnish coriander -->
  <path d="M220 108 Q228 98 234 105 Q228 114 220 108Z" fill="#4a8a28"/>
  <path d="M228 100 Q236 90 242 97 Q236 106 228 100Z" fill="#3a7a20"/>
  <path d="M236 107 Q244 97 250 104 Q244 113 236 107Z" fill="#4a8a28"/>

  <!-- Label -->
  <text x="200" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#e8a020" opacity="0.9" letter-spacing="0.3">Murgh Makhmali Kebab</text>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">SIGNATURE STARTERS</text>
</svg>