<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e1208"/>
      <stop offset="100%" stop-color="#0c1a0f"/>
    </radialGradient>
    <radialGradient id="plate" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <radialGradient id="prawn1" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="60%" stop-color="#e85520"/>
      <stop offset="100%" stop-color="#a03010"/>
    </radialGradient>
    <radialGradient id="prawn2" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff9a50"/>
      <stop offset="60%" stop-color="#e06020"/>
      <stop offset="100%" stop-color="#903818"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Dark cast iron plate -->
  <ellipse cx="200" cy="185" rx="108" ry="30" fill="#0a0a0a" opacity="0.7"/>
  <ellipse cx="200" cy="178" rx="112" ry="32" fill="url(#plate)"/>
  <ellipse cx="200" cy="175" rx="105" ry="28" fill="#171717"/>
  <ellipse cx="200" cy="172" rx="100" ry="25" fill="#1a1a1a"/>

  <!-- Lime wedge -->
  <path d="M290 168 Q300 158 308 165 Q305 178 295 180 Z" fill="#5a9a20"/>
  <path d="M290 168 Q300 158 308 165" fill="none" stroke="#7ac030" stroke-width="1"/>
  <path d="M296 162 Q300 160 304 163" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>

  <!-- Prawn 1 - large, foreground -->
  <path d="M155 185 Q135 160 145 140 Q160 120 180 130 Q195 140 185 158 Q178 170 165 178Z" fill="url(#prawn1)"/>
  <!-- Prawn body segments -->
  <path d="M160 175 Q150 158 155 145" fill="none" stroke="#c04010" stroke-width="1" opacity="0.5"/>
  <path d="M163 170 Q154 155 158 143" fill="none" stroke="#ff9050" stroke-width="0.5" opacity="0.4"/>
  <!-- Prawn tail fan -->
  <path d="M182 132 L190 122 M182 132 L188 118 M182 132 L184 116" stroke="#ff7030" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Prawn head -->
  <ellipse cx="167" cy="178" rx="8" ry="5" fill="#c03808" transform="rotate(-30 167 178)"/>
  <!-- Antennae -->
  <path d="M163 173 Q150 158 148 148" fill="none" stroke="#e06020" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Prawn 2 - mid -->
  <path d="M215 178 Q195 150 208 132 Q224 114 242 125 Q256 136 245 155 Q238 167 225 172Z" fill="url(#prawn2)"/>
  <path d="M220 168 Q210 150 215 138" fill="none" stroke="#c04010" stroke-width="1" opacity="0.5"/>
  <path d="M244 127 L252 117 M244 127 L250 114 M244 127 L245 112" stroke="#ff7030" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <ellipse cx="228" cy="171" rx="7" ry="4" fill="#c03808" transform="rotate(-25 228 171)"/>

  <!-- Prawn 3 - back -->
  <path d="M165 158 Q148 135 158 118 Q172 102 188 112 Q200 122 191 140 Q185 150 174 155Z" fill="#e06020" opacity="0.85"/>
  <path d="M188 114 L195 104 M188 114 L193 101" stroke="#ff7030" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Gunpowder spice scattered -->
  <circle cx="195" cy="162" r="1.5" fill="#3a1a08" opacity="0.8"/>
  <circle cx="188" cy="168" r="1" fill="#2a1005" opacity="0.9"/>
  <circle cx="210" cy="158" r="1.5" fill="#3a1a08" opacity="0.8"/>
  <circle cx="175" cy="172" r="1" fill="#2a1005" opacity="0.9"/>
  <circle cx="235" cy="160" r="1.2" fill="#4a2008" opacity="0.8"/>

  <!-- Curry leaf garnish -->
  <path d="M240 148 Q248 138 252 144 Q248 152 240 148Z" fill="#3a8a20"/>
  <path d="M244 138 Q252 128 256 134 Q252 142 244 138Z" fill="#4a9a28"/>
  <!-- Leaf vein -->
  <path d="M241 148 Q247 140 251 144" fill="none" stroke="#2a6a18" stroke-width="0.6"/>

  <!-- Heat shimmer / steam -->
  <path d="M178 120 Q180 112 178 104" fill="none" stroke="#ff6020" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
  <path d="M200 115 Q202 107 200 99" fill="none" stroke="#ff6020" stroke-width="0.8" opacity="0.25" stroke-linecap="round"/>

  <!-- Chilli flakes -->
  <path d="M160 165 L163 162 L164 165Z" fill="#cc2010" opacity="0.7"/>
  <path d="M220 165 L223 162 L224 165Z" fill="#cc2010" opacity="0.7"/>

  <!-- Label -->
  <text x="200" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#e8a020" opacity="0.9" letter-spacing="0.5">Gunpowder Prawns</text>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">SIGNATURE STARTERS</text>
</svg>