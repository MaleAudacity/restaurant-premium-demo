<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a0810"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <radialGradient id="jar" cx="45%" cy="30%" r="65%"><stop offset="0%" stop-color="#1e1828"/><stop offset="100%" stop-color="#100c18"/></radialGradient>
    <radialGradient id="cream" cx="40%" cy="25%" r="60%"><stop offset="0%" stop-color="#fffaf5"/><stop offset="70%" stop-color="#f8eeee"/><stop offset="100%" stop-color="#f0e0e0"/></radialGradient>
    <radialGradient id="jamun" cx="35%" cy="25%" r="65%"><stop offset="0%" stop-color="#8820a0"/><stop offset="55%" stop-color="#5c1070"/><stop offset="100%" stop-color="#2a0838"/></radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="200" rx="58" ry="11" fill="#010004" opacity="0.7"/>
  <!-- Glass jar -->
  <path d="M155 192 Q150 152 154 120 Q157 102 200 100 Q243 102 246 120 Q250 152 245 192 Z" fill="url(#jar)" opacity="0.85"/>
  <path d="M157 190 Q152 152 156 122 Q159 105 200 103 Q241 105 244 122 Q248 152 243 190 Z" fill="#160f20"/>
  <!-- Jar lid -->
  <rect x="152" y="97" width="96" height="12" rx="4" fill="#2a1e38"/>
  <rect x="154" y="99" width="92" height="8" rx="3" fill="#3a2848"/>
  <rect x="152" y="97" width="96" height="2" rx="1" fill="#6a48a0" opacity="0.5"/>
  <path d="M157 127 Q155 158 157 188" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.05" stroke-linecap="round"/>

  <!-- Gulab jamun syrup layer (bottom) -->
  <rect x="158" y="168" width="84" height="25" rx="2" fill="#3a0840" opacity="0.9"/>
  <rect x="160" y="170" width="80" height="21" rx="1" fill="#2a0630"/>
  <!-- Syrup sheen -->
  <ellipse cx="200" cy="172" rx="35" ry="5" fill="#5a1060" opacity="0.4"/>

  <!-- Gulab jamun balls visible -->
  <circle cx="180" cy="178" r="10" fill="url(#jamun)"/>
  <circle cx="180" cy="177" r="8" fill="#7a1890"/>
  <circle cx="180" cy="175" r="4" fill="#9820a8" opacity="0.5"/>
  <circle cx="200" cy="175" r="11" fill="url(#jamun)"/>
  <circle cx="200" cy="174" r="9" fill="#7a1890"/>
  <circle cx="200" cy="172" r="5" fill="#9820a8" opacity="0.4"/>
  <circle cx="220" cy="178" r="10" fill="url(#jamun)" opacity="0.9"/>
  <circle cx="220" cy="177" r="8" fill="#7a1890" opacity="0.9"/>

  <!-- Cheesecake cream layer -->
  <rect x="158" y="140" width="84" height="30" rx="1" fill="url(#cream)"/>
  <rect x="160" y="142" width="80" height="26" rx="1" fill="#fffaf8"/>
  <path d="M163 150 Q180 145 200 150 Q220 145 237 150" fill="none" stroke="#f0e8e8" stroke-width="1" opacity="0.5"/>
  <path d="M163 156 Q180 151 200 156 Q220 151 237 156" fill="none" stroke="#f0e8e8" stroke-width="0.8" opacity="0.4"/>

  <!-- Biscuit crumb base layer -->
  <rect x="158" y="112" width="84" height="28" rx="2" fill="#3a2810"/>
  <rect x="160" y="114" width="80" height="24" rx="1" fill="#2a2008"/>
  <!-- Crumb texture -->
  <circle cx="172" cy="122" r="2" fill="#4a3010" opacity="0.7"/>
  <circle cx="185" cy="119" r="1.8" fill="#3a2408" opacity="0.6"/>
  <circle cx="200" cy="121" r="2" fill="#4a3010" opacity="0.7"/>
  <circle cx="215" cy="119" r="1.8" fill="#3a2408" opacity="0.6"/>
  <circle cx="228" cy="122" r="2" fill="#4a3010" opacity="0.7"/>

  <!-- Jamun compote swirl on top -->
  <path d="M175 108 Q190 101 205 108 Q200 114 193 112 Q186 114 175 108Z" fill="url(#jamun)" opacity="0.8"/>

  <!-- Gold dust on top -->
  <circle cx="183" cy="104" r="1.5" fill="#d4a820" opacity="0.8"/>
  <circle cx="200" cy="102" r="1.5" fill="#d4a820" opacity="0.85"/>
  <circle cx="217" cy="104" r="1.5" fill="#d4a820" opacity="0.8"/>

  <!-- Label -->
  <text x="200" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#e8a020" opacity="0.9" letter-spacing="0.3">Jamun Cheesecake Jar</text>
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">DESSERTS &amp; POUR</text>
</svg>
