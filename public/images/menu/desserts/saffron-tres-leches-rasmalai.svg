<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a1005"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <radialGradient id="plate" cx="50%" cy="35%" r="60%"><stop offset="0%" stop-color="#2a2010"/><stop offset="100%" stop-color="#141008"/></radialGradient>
    <radialGradient id="rasmalai" cx="35%" cy="30%" r="65%"><stop offset="0%" stop-color="#fffaf5"/><stop offset="60%" stop-color="#f8f0e0"/><stop offset="100%" stop-color="#ece0c8"/></radialGradient>
    <radialGradient id="saffron" cx="50%" cy="30%" r="60%"><stop offset="0%" stop-color="#f0a820"/><stop offset="100%" stop-color="#c07808"/></radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="195" rx="108" ry="20" fill="#010100" opacity="0.65"/>
  <!-- Elegant dessert plate -->
  <ellipse cx="200" cy="186" rx="110" ry="36" fill="url(#plate)"/>
  <ellipse cx="200" cy="182" rx="106" ry="34" fill="#1e1808"/>
  <ellipse cx="200" cy="158" rx="106" ry="16" fill="#252010" stroke="#4a3818" stroke-width="1"/>
  <ellipse cx="200" cy="156" rx="102" ry="14" fill="#1e1808"/>
  <ellipse cx="200" cy="157" rx="106" ry="16" fill="none" stroke="#d4a820" stroke-width="1.5" opacity="0.55"/>

  <!-- Saffron milk pool on plate -->
  <ellipse cx="200" cy="158" rx="98" ry="14" fill="url(#saffron)" opacity="0.5"/>
  <ellipse cx="200" cy="157" rx="94" ry="12" fill="#e8a020" opacity="0.35"/>

  <!-- Rasmalai discs (3 sponge circles in milk) -->
  <ellipse cx="162" cy="156" rx="22" ry="14" fill="url(#rasmalai)"/>
  <ellipse cx="162" cy="154" rx="20" ry="12" fill="#fff8f0"/>
  <!-- Sponge texture -->
  <ellipse cx="156" cy="152" rx="5" ry="3" fill="#f0e8d8" opacity="0.6"/>
  <ellipse cx="167" cy="151" rx="4" ry="2.5" fill="#f0e8d8" opacity="0.5"/>

  <ellipse cx="200" cy="153" rx="24" ry="15" fill="url(#rasmalai)"/>
  <ellipse cx="200" cy="151" rx="22" ry="13" fill="#fff8f0"/>
  <ellipse cx="193" cy="149" rx="5" ry="3" fill="#f0e8d8" opacity="0.55"/>
  <ellipse cx="206" cy="148" rx="4.5" ry="2.5" fill="#f0e8d8" opacity="0.5"/>

  <ellipse cx="238" cy="156" rx="22" ry="14" fill="url(#rasmalai)" opacity="0.95"/>
  <ellipse cx="238" cy="154" rx="20" ry="12" fill="#fff8f0" opacity="0.95"/>

  <!-- Tres leches cream on top of rasmalai -->
  <ellipse cx="162" cy="152" rx="14" ry="8" fill="#fffcf5" opacity="0.7"/>
  <ellipse cx="200" cy="149" rx="16" ry="9" fill="#fffcf5" opacity="0.65"/>
  <ellipse cx="238" cy="152" rx="13" ry="7" fill="#fffcf5" opacity="0.65"/>

  <!-- Saffron strands on top -->
  <path d="M155 146 Q162 140 168 145" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M193 143 Q200 137 207 143" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M231 146 Q238 140 244 146" fill="none" stroke="#e89020" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Pistachio slivers -->
  <ellipse cx="160" cy="149" rx="4" ry="1.8" fill="#4a8820" transform="rotate(-20 160 149)" opacity="0.85"/>
  <ellipse cx="168" cy="147" rx="3.5" ry="1.5" fill="#3a7818" transform="rotate(15 168 147)" opacity="0.8"/>
  <ellipse cx="197" cy="145" rx="4" ry="1.8" fill="#4a8820" transform="rotate(-25 197 145)" opacity="0.85"/>
  <ellipse cx="205" cy="144" rx="3.5" ry="1.5" fill="#3a7818" transform="rotate(10 205 144)" opacity="0.8"/>
  <ellipse cx="236" cy="148" rx="4" ry="1.8" fill="#4a8820" transform="rotate(-15 236 148)" opacity="0.8"/>

  <!-- Rose petals -->
  <path d="M148 152 Q153 146 158 150 Q154 156 149 154 Q147 154 148 152Z" fill="#e87888" opacity="0.65"/>
  <path d="M240 148 Q245 142 250 146 Q246 152 241 150 Q239 150 240 148Z" fill="#e87888" opacity="0.6"/>

  <!-- Gold leaf accent -->
  <path d="M195 142 Q200 138 205 142" fill="none" stroke="#d4a820" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>

  <!-- Label -->
  <text x="200" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#e8a020" opacity="0.9" letter-spacing="0.3">Saffron Tres Leches Rasmalai</text>
  <text x="200" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">DESSERTS &amp; POUR</text>
</svg>
