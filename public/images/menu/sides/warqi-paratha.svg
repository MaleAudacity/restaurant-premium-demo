<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#1a1005"/><stop offset="100%" stop-color="#0c1a0f"/></radialGradient>
    <linearGradient id="paratha" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f0d888"/><stop offset="40%" stop-color="#d8b848"/><stop offset="100%" stop-color="#a88018"/></linearGradient>
    <linearGradient id="layer" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e8c858"/><stop offset="100%" stop-color="#c09828"/></linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="192" rx="115" ry="22" fill="#040300" opacity="0.55"/>
  <ellipse cx="200" cy="185" rx="118" ry="24" fill="#181008"/>
  <ellipse cx="200" cy="181" rx="110" ry="20" fill="#1e1408"/>

  <!-- Warqi paratha - square/layered look -->
  <!-- Bottom layers visible -->
  <rect x="108" y="148" width="184" height="38" rx="6" fill="#9a7808" opacity="0.5"/>
  <rect x="110" y="146" width="180" height="37" rx="5" fill="#b08a18" opacity="0.6"/>
  <rect x="112" y="144" width="176" height="36" rx="5" fill="#c09820"/>

  <!-- Main top layer -->
  <rect x="114" y="118" width="172" height="36" rx="6" fill="url(#paratha)"/>

  <!-- Flaky layer lines (warqi = layered) -->
  <line x1="114" y1="128" x2="286" y2="128" stroke="#c8a030" stroke-width="1.5" opacity="0.5"/>
  <line x1="114" y1="136" x2="286" y2="136" stroke="#c8a030" stroke-width="1.5" opacity="0.45"/>
  <line x1="114" y1="144" x2="286" y2="144" stroke="#b89020" stroke-width="1.5" opacity="0.4"/>

  <!-- Visible flaky edges at sides -->
  <path d="M114 118 Q110 128 112 136 Q114 144 114 154" fill="none" stroke="#e8c848" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M286 118 Q290 128 288 136 Q286 144 286 154" fill="none" stroke="#e8c848" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Golden char spots on top -->
  <ellipse cx="158" cy="128" rx="14" ry="8" fill="#8a6010" opacity="0.4"/>
  <ellipse cx="210" cy="124" rx="16" ry="8" fill="#8a6010" opacity="0.35"/>
  <ellipse cx="248" cy="130" rx="12" ry="7" fill="#8a6010" opacity="0.35"/>

  <!-- Ghee puddles on top -->
  <ellipse cx="172" cy="122" rx="12" ry="5" fill="#f8e040" opacity="0.55"/>
  <ellipse cx="218" cy="120" rx="10" ry="4" fill="#f0d840" opacity="0.45"/>

  <!-- Layered edge texture at top -->
  <path d="M120 118 Q130 112 140 117 Q150 112 160 117 Q170 112 180 117 Q190 112 200 117 Q210 112 220 117 Q230 112 240 117 Q250 112 260 117 Q270 112 280 117" fill="none" stroke="#f0d060" stroke-width="1" opacity="0.6"/>

  <!-- Butter curl on top -->
  <path d="M190 115 Q198 108 206 113" fill="none" stroke="#f8e840" stroke-width="2" stroke-linecap="round" opacity="0.75"/>

  <!-- Coriander chutney dip in corner -->
  <circle cx="105" cy="160" r="18" fill="#1a5010" opacity="0.85"/>
  <circle cx="105" cy="160" r="14" fill="#2a6a18"/>
  <circle cx="105" cy="160" r="8" fill="#3a7a20" opacity="0.7"/>

  <!-- Label -->
  <text x="200" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#e8a020" opacity="0.9">Warqi Paratha</text>
  <text x="200" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8b89a" opacity="0.6" letter-spacing="1.5">BREADS &amp; SIDES</text>
</svg>
