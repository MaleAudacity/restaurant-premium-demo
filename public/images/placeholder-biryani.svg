  <ellipse cx="200" cy="148" rx="4" ry="2" fill="none" stroke="#c8b89a" stroke-width="1" stroke-opacity="0.35" transform="rotate(10 200 148)"/>
  <ellipse cx="215" cy="138" rx="4" ry="2" fill="none" stroke="#c8b89a" stroke-width="1" stroke-opacity="0.35" transform="rotate(-15 215 138)"/>
  <!-- Saffron strands hint -->
  <path d="M195 125 Q197 120 200 125 Q202 120 205 125" fill="none" stroke="#e8a020" stroke-width="1" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Label -->
