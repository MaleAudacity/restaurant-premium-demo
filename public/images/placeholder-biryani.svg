<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#111f15"/>
  <rect x="20" y="20" width="360" height="260" rx="16" fill="#162a1a" stroke="#e8a020" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Handi (cooking pot) shape -->
  <path d="M155 100 L145 160 Q145 175 200 178 Q255 175 255 160 L245 100 Z" fill="none" stroke="#e8a020" stroke-width="1.5" stroke-opacity="0.5"/>
  <ellipse cx="200" cy="100" rx="45" ry="12" fill="none" stroke="#e8a020" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Lid handle -->
  <path d="M190 88 Q200 82 210 88" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
