<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#111f15"/>
  <rect x="20" y="20" width="360" height="260" rx="16" fill="#162a1a" stroke="#e8a020" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Bread / naan shape -->
  <ellipse cx="200" cy="140" rx="55" ry="35" fill="none" stroke="#e8a020" stroke-width="1.5" stroke-opacity="0.5" transform="rotate(-10 200 140)"/>
  <!-- Texture lines on bread -->
  <path d="M170 128 Q200 122 230 128" fill="none" stroke="#c8b89a" stroke-width="1" stroke-opacity="0.35" stroke-linecap="round"/>
  <path d="M165 138 Q200 132 235 138" fill="none" stroke="#c8b89a" stroke-width="1" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M168 148 Q200 142 232 148" fill="none" stroke="#c8b89a" stroke-width="0.8" stroke-opacity="0.25" stroke-linecap="round"/>
  <!-- Garnish dots -->
  <circle cx="188" cy="130" r="2" fill="#e8a020" opacity="0.4"/>
  <circle cx="210" cy="135" r="2" fill="#e8a020" opacity="0.4"/>
  <circle cx="198" cy="148" r="2" fill="#e8a020" opacity="0.35"/>
  <!-- Label -->
  <text x="200" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#e8a020" opacity="0.7">Breads &amp; Sides</text>
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c8b89a" opacity="0.5">Image coming soon</text>
</svg>